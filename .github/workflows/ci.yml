name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,gui,mod-b,screen-audit]

      - name: Install Playwright browsers (for screen-audit tests)
        run: |
          pip install playwright>=1.40.0
          playwright install chromium --with-deps
        continue-on-error: true

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=src/aegisScout --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: coverage.xml
        continue-on-error: true

      - name: Run mypy type checker
        run: |
          mypy src/aegisScout --ignore-missing-imports
        continue-on-error: true
